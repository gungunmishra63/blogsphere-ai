<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | BlogSphere AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-3 sidebar">

<h2 class="mb-4">
🚀 BlogSphere
</h2>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="create-blog.html">✍️ Create Blog</a>

<a href="profile.html">👤 Profile</a>

<a href="#" onclick="logout()">
🚪 Logout
</a>

</div>

<!-- Main Content -->

<div class="col-md-9 p-4">

<h1>
Dashboard
</h1>

<p>
Welcome Back 👋
</p>

<!-- Stats -->

<div class="row mt-4">

<div class="col-md-4">

<div class="stat-box">

<h2 id="blogCount">
0
</h2>

<p>Total Blogs</p>

</div>

</div>

<div class="col-md-4">

<div class="stat-box">

<h2>
100+
</h2>

<p>Total Views</p>

</div>

</div>

<div class="col-md-4">

<div class="stat-box">

<h2>
50+
</h2>

<p>Total Likes</p>

</div>

</div>

</div>

<!-- Search -->

<div class="mt-4">

<input
type="text"
id="search"
class="form-control"
placeholder="Search Blogs..."
onkeyup="searchBlogs()">

</div>

<!-- Blog List -->

<div
id="blogs"
class="mt-4">

</div>

</div>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
